# Staging: single app image (Nginx + PHP-FPM + Horizon via Supervisor).
# Usage: cp env/staging.env.example api/.env && edit api/.env, then:
#   docker compose -f compose.staging.yml up -d --build
# Migrations run automatically via entrypoint. To run manually:
#   docker compose -f compose.staging.yml exec php php artisan migrate --force
# Seed plans: docker compose -f compose.staging.yml exec php php artisan db:seed --class=SubscriptionPlanSeeder

version: "3.9"

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    image: moviemind-api:staging
    container_name: moviemind-staging-app
    env_file:
      - ./api/.env
    environment:
      APP_ENV: staging
      APP_DEBUG: "0"
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/up"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

  db:
    image: postgres:15
    container_name: moviemind-staging-db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-moviemind_staging}
      POSTGRES_USER: ${DB_USERNAME:-moviemind}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-moviemind}
    volumes:
      - staging_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-moviemind} -d ${DB_DATABASE:-moviemind_staging}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: moviemind-staging-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - staging_redis_data:/data
    ports:
      - "6380:6379"

volumes:
  staging_db_data:
  staging_redis_data:
