server {
    listen 80;
    server_name localhost;

    # Docker internal DNS – required when using variable in fastcgi_pass
    resolver 127.0.0.11 valid=10s;

    root /var/www/html/public;
    index index.php index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Prevent Nginx from adding a trailing slash and redirecting
    absolute_redirect off;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Explicitly handle /admin path to avoid redirects
    location = /admin {
        try_files $uri /index.php?$query_string;
    }

    # Documentation routes - must go through Laravel, not serve files directly
    location ~ ^/api/(doc|docs/) {
        try_files $uri /index.php?$query_string;
    }

    location ~ ^/livewire/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        set $php_upstream 127.0.0.1:9000;
        fastcgi_pass $php_upstream;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Timeouts (avoid 502 when Laravel bootstrap is slow)
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 120s;
        fastcgi_read_timeout 120s;

        # Pass the correct host and protocol to PHP-FPM
        fastcgi_param HOST $http_host;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param X-Forwarded-For $proxy_add_x_forwarded_for;
        fastcgi_param X-Forwarded-Proto $scheme;
        fastcgi_param X-Forwarded-Host $host;
        fastcgi_param X-Forwarded-Port $server_port;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    client_max_body_size 20m;
}
