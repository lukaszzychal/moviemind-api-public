components:
  securitySchemes:
    AdminToken:
      type: apiKey
      in: header
      name: X-Admin-Token
    basicAuth:
      type: http
      scheme: basic
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    ApplicationFeedback:
      type: object
      description: Anonymous application feedback (no personal data)
      properties:
        id:
          type: string
          format: uuid
        message:
          type: string
        category:
          type: string
          nullable: true
          enum: [bug, suggestion, other]
        status:
          type: string
          enum: [pending, read, archived]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Genre:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
    Movie:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        release_year:
          type: integer
          nullable: true
        director:
          type: string
          nullable: true
    MovieDescription:
      type: object
      properties:
        id:
          type: integer
        locale:
          type: string
        text:
          type: string
        context_tag:
          type: string
        origin:
          type: string
        ai_model:
          type: string
    MovieFull:
      allOf:
        - $ref: '#/components/schemas/Movie'
        - type: object
          properties:
            default_description:
              $ref: '#/components/schemas/MovieDescription'
            descriptions:
              type: array
              items:
                $ref: '#/components/schemas/MovieDescription'
            genres:
              type: array
              items:
                $ref: '#/components/schemas/Genre'
            people:
              type: array
              items:
                $ref: '#/components/schemas/Person'
            _links:
              type: object
              additionalProperties: true
    
    Person:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        birth_date:
          type: string
          format: date
          nullable: true
        birthplace:
          type: string
          nullable: true
    PersonBio:
      type: object
      properties:
        id:
          type: integer
        locale:
          type: string
        text:
          type: string
        context_tag:
          type: string
        origin:
          type: string
        ai_model:
          type: string
    PersonFull:
      allOf:
        - $ref: '#/components/schemas/Person'
        - type: object
          properties:
            default_bio:
              $ref: '#/components/schemas/PersonBio'
            bios:
              type: array
              items:
                $ref: '#/components/schemas/PersonBio'
            movies:
              type: array
              items:
                $ref: '#/components/schemas/Movie'
            _links:
              type: object
              additionalProperties: true

    TvSeries:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        first_air_date:
          type: string
          format: date
          nullable: true
        last_air_date:
          type: string
          format: date
          nullable: true
        number_of_seasons:
          type: integer
        number_of_episodes:
          type: integer
    TvSeriesFull:
      allOf:
        - $ref: '#/components/schemas/TvSeries'
        - type: object
          properties:
            descriptions:
              type: array
              items:
                type: object
                properties:
                  text:
                    type: string
            genres:
              type: array
              items:
                $ref: '#/components/schemas/Genre'
            people:
              type: array
              items:
                $ref: '#/components/schemas/Person'

    TvShow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        first_air_date:
          type: string
          format: date
          nullable: true
    TvShowFull:
      allOf:
        - $ref: '#/components/schemas/TvShow'
        - type: object
          properties:
            descriptions:
              type: array
              items:
                type: object
                properties:
                  text:
                    type: string

    DebugConfig:
      type: object
      properties:
        environment: { type: object }
        openai: { type: object }
        queue: { type: object }
    
    Job:
      type: object
      properties:
        job_id: { type: string, format: uuid }
        status: { type: string, enum: [PENDING, DONE, FAILED, UNKNOWN] }
        entity: { type: string, enum: [MOVIE, PERSON, TV_SERIES, TV_SHOW] }
        slug: { type: string }
        error: { type: object }

    AcceptedGeneration:
      type: object
      properties:
        job_id: { type: string, format: uuid }
        status: { type: string, enum: [PENDING] }
        slug: { type: string }
        locale: { type: string }
        context_tags: 
          type: array
          items:
            type: string

    GenerateRequest:
      type: object
      required: [entity_type]
      oneOf:
        - required: [slug]
        - required: [entity_id]
      properties:
        entity_type:
          type: string
          enum: [MOVIE, PERSON, TV_SERIES, TV_SHOW]
          description: |
            Type of entity to generate content for.
            Use `MOVIE` for movies.
            Use `PERSON` for actors, directors, writers, producers.
            Use `TV_SERIES` for scripted TV series (dramas, comedies, limited series).
            Use `TV_SHOW` for unscripted TV shows (talk shows, reality, news, documentaries).
          example: MOVIE
        slug:
          type: string
          maxLength: 255
          description: Preferred identifier for the entity (e.g. `the-matrix-1999`). Required when `entity_id` is omitted.
          example: the-matrix-1999
        entity_id:
          type: string
          maxLength: 255
          description: Alias for `slug` used by legacy clients (still accepted). Required when `slug` is omitted.
          example: the-matrix-1999
        locale:
          type: string
          maxLength: 10
          description: Locale for generated content (ISO format, e.g., en-US, pl-PL)
          default: en-US
          example: en-US
        context_tag:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
                maxLength: 64
          description: Single context tag or array of context tags to influence generation style
          example: modern

