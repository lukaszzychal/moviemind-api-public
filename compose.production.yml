# Production: single app image (Nginx + PHP-FPM + Horizon via Supervisor).
# Usage: cp env/production.env.example api/.env && set all required secrets, then:
#   docker compose -f compose.production.yml up -d --build
# Migrations run automatically via entrypoint. To run manually:
#   docker compose -f compose.production.yml exec php php artisan migrate --force
# Optimize (optional, entrypoint does this when APP_ENV=production):
#   docker compose -f compose.production.yml exec php php artisan config:cache
#   docker compose -f compose.production.yml exec php php artisan route:cache
#   docker compose -f compose.production.yml exec php php artisan view:cache
# IMPORTANT: Set ADMIN_AUTH_BYPASS_ENVS= and HORIZON_AUTH_BYPASS_ENVS= (empty) in api/.env.
# Use strong HORIZON_BASIC_AUTH_PASSWORD and ADMIN_BASIC_AUTH_PASSWORD (min 32 chars).

version: "3.9"

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    image: moviemind-api:production
    container_name: moviemind-production-app
    env_file:
      - ./api/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "0"
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/up"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

  db:
    image: postgres:15
    container_name: moviemind-production-db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-moviemind_prod}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - production_db_data:/var/lib/postgresql/data
    # Do not expose 5432 to host in production if using external DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE:-moviemind_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: moviemind-production-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - production_redis_data:/data
    restart: unless-stopped

volumes:
  production_db_data:
  production_redis_data:
