name: Build and Publish to GHCR

on:
  push:
    branches: [ "main", "develop" ]
    tags: [ 'v*', 'staging-*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - component: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - component: backend
            context: .
            dockerfile: ./docker/php/Dockerfile
            target: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=staging,enable=${{ startsWith(github.ref, 'refs/tags/staging-') }}
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target || '' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tags
        run: |
          echo "## 🐳 \${{ matrix.component }} Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`\${{ env.REGISTRY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`\${{ github.repository }}-\${{ matrix.component }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`\${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '\`\`\`' >> $GITHUB_STEP_SUMMARY
          echo "\${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '\`\`\`' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo '\`\`\`bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull \${{ env.REGISTRY }}/\${{ github.repository }}-\${{ matrix.component }}:\${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          if [[ "\${{ github.ref }}" == refs/tags/staging-* ]]; then
            echo "docker pull \${{ env.REGISTRY }}/\${{ github.repository }}-\${{ matrix.component }}:staging" >> $GITHUB_STEP_SUMMARY
          else
            echo "docker pull \${{ env.REGISTRY }}/\${{ github.repository }}-\${{ matrix.component }}:latest" >> $GITHUB_STEP_SUMMARY
          fi
          echo '\`\`\`' >> $GITHUB_STEP_SUMMARY
